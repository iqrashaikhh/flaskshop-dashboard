{% extends "base.html" %}

{% block content %}

<h2>Admin Dashboard</h2>

<h4>Add Product</h4>

<form action="/add-product" method="POST" class="row g-3">

    <div class="col-md-4">
        <input type="text" name="name" class="form-control" placeholder="Product Name">
    </div>

    <div class="col-md-3">
        <input type="number" name="price" class="form-control" placeholder="Price">
    </div>

    <div class="col-md-3">
        <input type="text" name="image" class="form-control" placeholder="Image URL">
    </div>

    <!-- ✅ ADD THIS -->
    <div class="col-md-6">
        <input type="text" name="description" class="form-control" placeholder="Product Description">
    </div>

    <div class="col-md-2">
        <button class="btn btn-primary">Add</button>
    </div>

</form>

<hr>

<h4>Products</h4>

<div class="card p-4 shadow-lg">

    <table class="table table-hover text-center align-middle">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>

        {% for product in products %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ product[1] }}</td>
            <td class="text-success fw-bold">₹{{ product[2] }}</td>

            <!-- ✅ NEW -->
            <td>{{ product[4] }}</td>

            <td>
                <a href="/edit-product/{{ product[0] }}" class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="/delete-product/{{ product[0] }}" class="btn btn-danger btn-sm"
                    onclick="return confirm('Delete this product?')">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>
</div>
{% endblock %}
