{% extends "base.html" %}
{% block content %}

<div class="container py-5">

    <h2>Edit Product</h2>

    <form action="/update-product/{{ product[0] }}" method="POST" class="row g-3">

        <div class="col-md-6">
            <label>Name</label>
            <input type="text" name="name" value="{{ product[1] }}" class="form-control">
        </div>

        <div class="col-md-3">
            <label>Price</label>
            <input type="number" name="price" value="{{ product[2] }}" class="form-control">
        </div>

        <div class="col-md-6">
            <label>Image</label>
            <input type="text" name="image" value="{{ product[3] }}" class="form-control">
        </div>

        <div class="col-12">
            <button class="btn btn-success">Update</button>
            <a href="/admin" class="btn btn-secondary">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
