{% extends "base.html" %}

{% block content %}
<style>
    /* Animated Dark Mesh Background */
    body {
        background: radial-gradient(circle at 50% 50%, #1a1c2c 0%, #0d0e17 100%);
        background-attachment: fixed;
        color: #e2e8f0;
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
    }

    /* Floating Glass Card */
    .glass-profile-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }

    .glass-profile-card:hover {
        transform: translateY(-10px) scale(1.02);
        box-shadow: 0 35px 60px -15px rgba(99, 102, 241, 0.2);
        border-color: rgba(99, 102, 241, 0.4);
    }

    /* Avatar with Neon Ring */
    .avatar-container {
        position: relative;
        display: inline-block;
        padding: 5px;
        border-radius: 50%;
        background: linear-gradient(45deg, #6366f1, #a855f7);
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        transition: transform 0.5s ease;
    }

    .avatar-container:hover {
        transform: rotate(10deg);
        box-shadow: 0 0 30px rgba(168, 85, 247, 0.8);
    }

    .profile-img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border: 4px solid #0d0e17;
    }

    /* Name & Title Styling */
    .profile-name {
        font-weight: 800;
        font-size: 1.8rem;
        background: linear-gradient(to right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-top: 15px;
    }

    .profile-subtitle {
        color: #6366f1;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 0.75rem;
        margin-bottom: 30px;
        text-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
    }

    /* Glass Input Fields */
    .info-label {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-left: 15px;
        margin-bottom: 5px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .glass-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 12px 20px;
        color: #fff;
        font-weight: 500;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        transition: all 0.3s ease;
    }

    .glass-field:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
    }

    /* Custom Buttons */
    .btn-dashboard {
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        border: none;
        color: white;
        font-weight: 600;
        padding: 14px;
        border-radius: 16px;
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        transition: all 0.3s ease;
        text-decoration: none;
        display: block;
        text-align: center;
    }

    .btn-dashboard:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(124, 58, 237, 0.6);
        color: white;
    }

    .btn-logout {
        background: transparent;
        border: 1px solid rgba(239, 68, 68, 0.4);
        color: #ef4444;
        font-weight: 600;
        padding: 12px;
        border-radius: 16px;
        transition: all 0.3s ease;
        text-decoration: none;
        display: block;
        text-align: center;
    }

    .btn-logout:hover {
        background: rgba(239, 68, 68, 0.1);
        border-color: #ef4444;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        color: #ef4444;
    }

    /* Icon Accent */
    .field-icon {
        color: #6366f1;
        margin-right: 12px;
        opacity: 0.8;
    }

</style>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="glass-profile-card text-center animate__animated animate__zoomIn">

        <div class="mb-2">
            <div class="avatar-container">
                <img src="https://ui-avatars.com/api/?name={{ user[0] }}&background=1a1c2c&color=6366f1&size=110&bold=true" 
                     class="rounded-circle profile-img"
                     alt="User Avatar">
            </div>
        </div>

        <h3 class="profile-name">{{ user[0] }}</h3>
        <p class="profile-subtitle">Verified Profile</p>

        <div class="text-start mb-4">

            <div class="mb-1">
                <label class="info-label">
                    <i class="fas fa-user field-icon"></i> FULL NAME
                </label>
                <div class="glass-field">
                    {{ user[0] }}
                </div>
            </div>

            <div class="mb-1">
                <label class="info-label">
                    <i class="fas fa-envelope field-icon"></i> EMAIL ADDRESS
                </label>
                <div class="glass-field">
                    {{ user[1] }}
                </div>
            </div>

        </div>

        <div class="d-grid gap-3">
            <a href="/dashboard" class="btn-dashboard">
                <i class="fas fa-chart-pie me-2"></i> Access Dashboard
            </a>

            <a href="/logout" class="btn-logout">
                <i class="fas fa-sign-out-alt me-2"></i> System Logout
            </a>
        </div>

    </div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

{% endblock %}
